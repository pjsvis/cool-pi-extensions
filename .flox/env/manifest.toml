schema-version = "1.11.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
bun.pkg-path = "bun"
bun.version = "1.3"
just.pkg-path = "just"
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = '''
  # Make pi-models available on PATH
  if [ -d "$PWD/src/cli/pi-models" ]; then
    export PATH="$PWD/src/cli/pi-models/src:$PATH"
  fi

  # Install Bun deps for CLI tools if needed
  if [ -f "$PWD/src/cli/pi-models/bun.lock" ] && [ ! -d "$PWD/src/cli/pi-models/node_modules" ]; then
    echo "→ Installing pi-models dependencies..."
    (cd "$PWD/src/cli/pi-models" && bun install --silent) || true
  fi

  echo ""
  echo "=== cool-pi-extensions environment check ==="

  MISSING=0

  # Required tools
  for bin in bun just; do
    if command -v "$bin" >/dev/null 2>&1; then
      echo "  ✓ $bin"
    else
      echo "  ✗ $bin — NOT FOUND (required)"
      MISSING=1
    fi
  done

  # Optional tools
  for bin in rtk skate glow; do
    if command -v "$bin" >/dev/null 2>&1; then
      echo "  ✓ $bin (optional)"
    else
      echo "  ⚠ $bin — not found (optional, brew install $bin)"
    fi
  done

  # pi
  if command -v pi >/dev/null 2>&1; then
    echo "  ✓ pi"
  else
    echo "  ✗ pi — not on PATH (npm install -g @mariozechner/pi-coding-agent)"
    MISSING=1
  fi

  # Fresh editor config
  if [ -d ~/.config/fresh ]; then
    echo "  ✓ Fresh config (~/.config/fresh)"
  else
    echo "  ⚠ Fresh config not found at ~/.config/fresh"
  fi

  echo ""
  if [ $MISSING -eq 1 ]; then
    echo "⚠  Some required tools are missing — run 'just provision' for details"
  else
    echo "✓  Environment ready"
  fi
'''


